apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: bank-app
data:
  POSTGRES_DB: userdb
  POSTGRES_USER: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: bank-app
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: secret123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-user
  namespace: bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-user
  template:
    metadata:
      labels:
        app: postgres-user
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-user
  namespace: bank-app
spec:
  selector:
    app: postgres-user
  ports:
    - port: 5432
      targetPort: 5432