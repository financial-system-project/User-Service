apiVersion: v1
kind: Namespace
metadata:
  name: bank-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres-user
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: bank-app
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort