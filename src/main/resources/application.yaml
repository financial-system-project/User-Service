server:
  port: 8080

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/userdb
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── ELK / Logging ────────────────────────────────────────────────────────────
# LOGSTASH_HOST is injected by the Helm ConfigMap when SPRING_PROFILES_ACTIVE=k8s.
# logback-spring.xml reads it directly via ${LOGSTASH_HOST:-logstash.logging:5000},
# so no extra wiring is needed here; this block documents the expected value.
logging:
  config: classpath:logback-spring.xml
